steps:
  # 1. Fetch .env from GCP Secret Manager dynamically using project number
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud secrets versions access projects/$PROJECT_NUMBER/secrets/${_SECRET_NAME}/versions/latest > .env
    id: 'fetch-secrets'

  # 2. Install dependencies (using clean install)
  - name: 'node:22.20.0'
    entrypoint: 'npm'
    args: ['ci']
    id: 'install-root-deps'

  # 3. Build the frontend
  - name: 'node:22.20.0'
    entrypoint: 'npm'
    args: ['run', 'build']
    id: 'build-frontend'

  # 4. Deploy to Firebase Hosting & Firestore Rules
  - name: 'node:22.20.0'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm install -g firebase-tools
        # Dynamically inject the target hosting site into firebase.json
        node -e "const fs=require('fs'); const fc=JSON.parse(fs.readFileSync('firebase.json','utf8')); fc.hosting.site='${_FIREBASE_HOSTING_SITE}'; fs.writeFileSync('firebase.json',JSON.stringify(fc,null,2));"
        
        echo "Deploying Firestore Rules..."
        npm run deploy:rules -- --project $PROJECT_ID --non-interactive
        
        echo "Deploying Hosting to site ${_FIREBASE_HOSTING_SITE}"
        firebase deploy --only hosting --non-interactive --project $PROJECT_ID
    id: 'deploy-firebase'

substitutions:
  # Set placeholder values which MUST be overridden in Cloud Build trigger configurations in GCP Console
  _SECRET_NAME: 'YOUR_SECRET_NAME'
  _FIREBASE_HOSTING_SITE: 'YOUR_FIREBASE_HOSTING_SITE'

options:
  logging: CLOUD_LOGGING_ONLY
